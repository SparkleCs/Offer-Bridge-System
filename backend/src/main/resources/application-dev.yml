server:
  port: 8080

spring:
  config:
    import:
      - optional:file:./application-local.yml
      - optional:file:./backend/application-local.yml
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/offer_bridge?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 121380hxy
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 2s
    mongodb:
      uri: mongodb://127.0.0.1:27017/offer_bridge_forum
      auto-index-creation: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    issuer: offer-bridge
    access-expire-seconds: 7200
    refresh-expire-seconds: 604800
    secret: CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32_BYTES_MINIMUM
  sms:
    mock-enabled: true
    code-ttl-seconds: 300
    send-interval-seconds: 60
  upload:
    local-dir: uploads
  alipay:
    enabled: false
    app-id: ${ALIPAY_APP_ID:}
    gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
    sign-type: ${ALIPAY_SIGN_TYPE:RSA2}
    charset: ${ALIPAY_CHARSET:UTF-8}
    format: ${ALIPAY_FORMAT:json}
    notify-url: ${ALIPAY_NOTIFY_URL:}
    return-url: ${ALIPAY_RETURN_URL:http://localhost:5173/orders}
    app-private-key: ${ALIPAY_APP_PRIVATE_KEY:}
    alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
  ai:
    service-url: ${AI_SERVICE_URL:http://127.0.0.1:8001}
